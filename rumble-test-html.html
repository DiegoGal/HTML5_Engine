<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Engine - Rumble test (HTML UI)</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="src/examples/rumble_ui.css">
    <script src="src/engine/renderer.js"></script>
    <script src="src/engine/main.js"></script>
    <script src="src/engine/utils_math.js"></script>
    <script src="src/engine/input.js"></script>
    <script src="src/engine/audioplayer.js"></script>
    <script src="src/engine/game.js"></script>
    <script src="src/engine/utils_classes.js"></script>
    <script src="src/engine/gameobjects.js"></script>
    <script src="src/engine/htmlmenu.js"></script>
    <script src="src/examples/rumble_test_html.js"></script>
</head>
<body>
    <div id="container">
        <!-- Canvas: full 640x480 — ring bursts animate in the background -->
        <canvas id="myCanvas" width="640" height="480"></canvas>

        <!-- HTML UI overlay — managed via RumbleUI extends HTMLMenu -->
        <div id="rumblePanel">

        <div id="statusBar">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">No gamepad detected — keyboard shortcuts still work</span>
        </div>

        <div class="section-label">Presets</div>
        <div id="presetGrid">
            <button class="preset-btn preset-tap" id="presetTap">
                <span class="key-label">1 / A</span>
                <span class="preset-params">S:0.0  W:0.4  80ms</span>
                <span class="preset-name">Tap</span>
                <span class="preset-hint">Short light buzz</span>
            </button>
            <button class="preset-btn preset-impact" id="presetImpact">
                <span class="key-label">2 / B</span>
                <span class="preset-params">S:1.0  W:0.5  300ms</span>
                <span class="preset-name">Impact</span>
                <span class="preset-hint">Sudden heavy hit</span>
            </button>
            <button class="preset-btn preset-engine" id="presetEngine">
                <span class="key-label">3 / X</span>
                <span class="preset-params">S:0.6  W:0.2  1000ms</span>
                <span class="preset-name">Engine</span>
                <span class="preset-hint">Low continuous rumble</span>
            </button>
            <button class="preset-btn preset-buzz" id="presetBuzz">
                <span class="key-label">4 / Y</span>
                <span class="preset-params">S:0.0  W:1.0  600ms</span>
                <span class="preset-name">Buzz</span>
                <span class="preset-hint">High-freq vibration</span>
            </button>
        </div>

        <div class="section-label">Custom — pull LT / RT, then fire (500ms)</div>
        <div id="customSection">
            <div class="motor-row">
                <span class="motor-label">LT  Strong motor</span>
                <div class="bar-bg"><div class="bar-fill bar-strong" id="ltBar"></div></div>
                <span class="motor-value" id="ltValue">0.000</span>
            </div>
            <div class="motor-row">
                <span class="motor-label">RT  Weak motor</span>
                <div class="bar-bg"><div class="bar-fill bar-weak" id="rtBar"></div></div>
                <span class="motor-value" id="rtValue">0.000</span>
            </div>
            <div id="customFooter">
                <span id="fireHint">▶  START / Enter  →  fire</span>
                <button id="fireBtn">Fire custom</button>
            </div>
        </div>

        <div class="divider"></div>

        <div id="lastCallArea">
            <div class="section-label">Last call</div>
            <div id="lastCallAnnotation">// gamepadIndex  strong  weak  duration (ms)</div>
            <div id="lastCallSnippet" class="placeholder">Fire a preset or custom rumble to see the call here</div>
        </div>

        </div><!-- /#rumblePanel -->
    </div><!-- /#container -->
</body>
</html>
